spring:
  application:
    name: ai-diagnostic-ticket-triage-api

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  datasource:
    url: "${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/ai_triage_db}"
    username: "${SPRING_DATASOURCE_USERNAME:ai_triage_user}"
    password: "${SPRING_DATASOURCE_PASSWORD:ai_triage_password}"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

openai:
  api-key: "${OPENAI_API_KEY:}"
  model: "${OPENAI_MODEL:gpt-4o-mini}"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha