name: Java CI - AI Diagnostic Ticket Triage API

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    name: Build and Test Spring Boot API
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ai_triage_db
          POSTGRES_USER: ai_triage_user
          POSTGRES_PASSWORD: ai_triage_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ai_triage_user -d ai_triage_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ai_triage_db
      SPRING_DATASOURCE_USERNAME: ai_triage_user
      SPRING_DATASOURCE_PASSWORD: ai_triage_password
      OPENAI_API_KEY: ""
      OPENAI_MODEL: gpt-4o-mini

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run Maven clean test
        run: ./mvnw clean test

      - name: Build application jar
        run: ./mvnw clean package -DskipTests